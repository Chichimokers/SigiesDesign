<div class="flex flex-col bg-gray-50">
  <!-- Input para cargar archivos -->
<app-formularios
(formSubmit)="handelsubmit($event)"
 [fields]="fields"
 ></app-formularios>

  <!-- Contenedor del preview -->
  <div class="flex-1 p-4">

    <!-- Preview de PDF -->
    <iframe *ngIf="pdfUrl && fileType === 'pdf'"
            [src]="pdfUrl"
            style="width: 1000px; height: auto;"
            class="border-none"></iframe>

    <!-- Mensaje cuando no hay archivo -->
    <div *ngIf="!fileType" class="flex items-center justify-center h-full text-gray-500">

      Seleccione un archivo PDF o Excel para previsualizar

    </div>

  </div>

</div>
