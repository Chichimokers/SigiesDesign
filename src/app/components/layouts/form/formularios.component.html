<form [formGroup]="form" (ngSubmit)="onSubmit()" class="max-w-md mx-auto p-6 bg-white rounded-lg shadow-md">
  <!-- Campos del formulario -->
  <div *ngFor="let field of fields" class="mb-6">
    <label class="block text-sm font-medium text-gray-700 mb-2">{{ field.label }}</label>

    <ng-container [ngSwitch]="field.type">
      <!-- Campo de texto -->
      <input
        *ngSwitchCase="'text'"
        [formControlName]="field.id"
        type="text"
        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      />

      <!-- Campo numérico -->
      <input
        *ngSwitchCase="'number'"
        [formControlName]="field.id"
        type="number"
        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      />

      <!-- Campo de selección -->
      <select
        *ngSwitchCase="'select'"
        [formControlName]="field.id"
        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
        <option value="">Seleccione...</option>
        <option *ngFor="let option of optionsMap[field.id]" [value]="option">
          {{ option }}
        </option>
      </select>
    </ng-container>

    <!-- Mensaje de error -->
    <div
      *ngIf="form.get(field.id)?.invalid && form.get(field.id)?.touched"
      class="text-sm text-red-600 mt-1"+
    >
      Campo inválido
    </div>
  </div>

  <!-- Botón de envío -->
  <button
    type="submit"
    class="w-full bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
  >
    Enviar
  </button>
</form>
